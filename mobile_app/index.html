<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>48 Laws Vocab</title>
  <link rel="icon" href="icon-book.svg" type="image/svg+xml">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <header class="top">
      <div class="brand">
        <img src="icon-book.svg" alt="Book icon" class="brand-icon">
        <h1>48 Laws Vocab</h1>
      </div>
      <p>Одно слово за раз, как карточки из книги</p>
    </header>

    <section class="panel">
      <div class="row search-row">
        <input id="searchInput" type="search" placeholder="Поиск по 15400 словам (word / перевод)" autocomplete="off">
        <button id="btnSearch">Поиск</button>
        <button id="btnClearSearch">Очистить</button>
      </div>

      <div class="row">
        <button id="btnToday">Сегодня</button>
        <button id="btnNext">Следующая пачка</button>
        <button id="btnReview">Ревью</button>
      </div>

      <div class="row">
        <button id="btnStats">Статистика</button>
        <button id="btnReset" class="danger">Сброс прогресса</button>
      </div>

      <div class="row reminder-row">
        <label for="reminderTime">Напоминание:</label>
        <input id="reminderTime" type="time" value="20:00">
        <button id="btnEnableReminder">Включить ежедневно</button>
        <button id="btnDisableReminder">Выключить</button>
      </div>

      <div class="hint" id="status">Загрузка...</div>
    </section>

    <section class="word-nav">
      <button id="btnPrevWord">Предыдущее</button>
      <div id="wordCounter" class="counter">0 / 0</div>
      <button id="btnNextWord">Следующее</button>
    </section>

    <section id="cards" class="cards"></section>
  </main>

  <nav class="bottom-nav">
    <button id="btnBottomToday">Сегодня</button>
    <button id="btnBottomSearch">Поиск</button>
    <button id="btnBottomReview">Ревью</button>
  </nav>

  <template id="cardTemplate">
    <article class="card">
      <div class="card-head">
        <span class="idx"></span>
        <span class="badge"></span>
      </div>
      <h2 class="word"></h2>
      <details>
        <summary>Показать перевод</summary>
        <p class="translation"></p>
      </details>
      <p class="example"></p>
      <p class="prompt">Задание: составьте свое предложение с этим словом.</p>
      <div class="actions">
        <button data-grade="exclude"><span>Убрать</span><small class="eta"></small></button>
        <button data-grade="hard"><span>Hard</span><small class="eta"></small></button>
        <button data-grade="good"><span>Good</span><small class="eta"></small></button>
        <button data-grade="easy"><span>Easy</span><small class="eta"></small></button>
      </div>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
